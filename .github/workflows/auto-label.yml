name: Auto label issues

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Auto assign labels
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |

            const body = (context.payload.issue.body || "").toLowerCase();
            let labels = [];

            // ===== UTILIDAD: EXTRAER CAMPOS =====
            function extractField(label) {
              const regex = new RegExp(`### ${label}\\s*\\n([^\\n]+)`);
              const match = body.match(regex);
              return match ? match[1].trim() : null;
            }

            // ===== MIGRACIÓN: ORIGEN / DESTINO =====
            const origen = extractField("versión actual (origen)");
            const destino = extractField("versión destino");

            if (origen?.includes("5")) labels.push("origen:5");
            if (origen?.includes("6")) labels.push("origen:6");
            if (origen?.includes("7")) labels.push("origen:7");

            if (destino?.includes("7")) labels.push("destino:7");
            if (destino?.includes("8")) labels.push("destino:8");
            if (destino?.includes("9")) labels.push("destino:9");

            // ===== RUTA =====
            if (origen && destino) {
              const o = origen.match(/\d/);
              const d = destino.match(/\d/);

              if (o && d) {
                labels.push(`ruta:${o[0]}-${d[0]}`);
              }
            }

            // ===== VERSION GENERAL (instalación / incidencia) =====
            let version = extractField("versión de dspace");

            // fallback si no hay campo estructurado
            if (!version) {
              const versionMatch = body.match(/\b(7\.x|8\.x|9\.x)\b/);
              version = versionMatch ? versionMatch[0] : null;
            }

            if (version?.includes("7")) labels.push("versión:dspace7");
            if (version?.includes("8")) labels.push("versión:dspace8");
            if (version?.includes("9")) labels.push("versión:dspace9");

            // ===== ETAPA =====
            if (body.includes("planificación")) labels.push("etapa:planificacion");
            if (body.includes("instalación backend")) labels.push("etapa:backend");
            if (body.includes("instalación frontend")) labels.push("etapa:frontend");
            if (body.includes("migración de datos")) labels.push("etapa:datos");
            if (body.includes("personalizaciones")) labels.push("etapa:personalizaciones");

            // ===== LIMPIEZA: eliminar duplicados =====
            labels = [...new Set(labels)];

            // ===== APLICAR =====
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labels
              });
            }
